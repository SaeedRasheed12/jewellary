{% extends "base.html" %}
{% block title %}Add Product{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto mt-8">
  <h2 class="text-3xl font-bold mb-6">📦 Add New Product</h2>

  <form method="POST" enctype="multipart/form-data"
        class="bg-white p-6 rounded-xl shadow-lg space-y-5">

    <!-- 🏷️ Product Name -->
    <div>
      <label class="block font-semibold">Name <span class="text-red-500">*</span></label>
      <input type="text" name="name" required 
             class="w-full mt-1 border px-3 py-2 rounded-lg focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- Prices -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block font-semibold">Before Price (optional)</label>
        <input type="number" name="before_price" step="0.01" placeholder="e.g. 2000"
               class="w-full mt-1 border px-3 py-2 rounded-lg focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block font-semibold">Today Price <span class="text-red-500">*</span></label>
        <input type="number" name="today_price" step="0.01" placeholder="e.g. 1500" required
               class="w-full mt-1 border px-3 py-2 rounded-lg focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <!-- Rich Description Field -->
    <div>
     <label class="block font-semibold">Description</label>
     <textarea id="description" name="description" rows="10"
    class="w-full mt-1 border rounded-lg"></textarea>
    </div>

    <!-- TinyMCE Integration -->
    <script src="https://cdn.tiny.cloud/1/ea8lvzpeukfhja4w3hpe3gu10tio0lzy104pi7s0ksue34ep/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
  <script>
  tinymce.init({
  selector: '#description',
  height: 300,
  menubar: false,
  plugins: 'lists link image code',
  toolbar: 'undo redo | bold italic underline | bullist numlist | link | code',
  content_style: "body { font-family: Poppins, sans-serif; font-size: 14px; }"
});
</script>


    <!-- Category -->
    <div>
      <label class="block font-semibold">Category</label>
      <select name="category_id" required
              class="w-full mt-1 border px-3 py-2 rounded-lg focus:ring-2 focus:ring-blue-400">
        <option value="">-- Select Category --</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Cover Image -->
    <div>
      <label class="block font-semibold">Cover Image <span class="text-red-500">*</span></label>
      <input type="file" name="image" accept="image/*" required
             class="w-full mt-1 border p-2 rounded-lg bg-gray-50 cursor-pointer" />
      <p class="text-xs text-gray-500 mt-1">Uploaded to Cloudinary on submit</p>
    </div>

    <!-- Gallery Images -->
    <div>
      <label class="block font-semibold">Gallery Images (Optional)</label>
      <input type="file" name="gallery_images" accept="image/*" multiple
             class="w-full mt-1 border p-2 rounded-lg bg-gray-50 cursor-pointer" />
      <p class="text-xs text-gray-500 mt-1">You can select multiple images, they’ll upload to Cloudinary.</p>
    </div>

    <!-- 🎥 Product Video -->
    <div>
      <label class="block font-semibold">Product Video (Optional)</label>
      <input type="file" name="video" accept="video/*"
             class="w-full mt-1 border p-2 rounded-lg bg-gray-50 cursor-pointer" />
      <p class="text-xs text-gray-500 mt-1">Upload a demo or promotional video (mp4, mov, etc). Stored in Cloudinary.</p>
    </div>

    <!-- Submit -->
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow transition">
      🚀 Upload Product
    </button>
  </form>
</div>
{% endblock %}
